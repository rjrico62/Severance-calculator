<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Severance Calculator</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f6f8; padding:40px; }
    .card { background:white; padding:24px; border-radius:12px; max-width:500px; margin:auto; box-shadow:0 10px 25px rgba(0,0,0,0.1); }
    h1 { font-size:22px; margin-bottom:16px; }
    label { display:block; margin-top:12px; }
    input { width:100%; padding:10px; margin-top:6px; border-radius:8px; border:1px solid #ccc; }
    button { margin-top:16px; padding:12px; width:100%; border:none; border-radius:10px; background:#007bff; color:white; font-size:16px; cursor:pointer; }
    .result { margin-top:20px; font-size:18px; font-weight:bold; }
    .small { font-size:12px; color:#666; margin-top:10px; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Layoff Severance Calculator</h1>

    <label>Weekly Pay ($)</label>
    <input type="number" id="weeklyPay" placeholder="e.g. 1500" />

    <label>Months of Service</label>
    <input type="number" id="months" placeholder="e.g. 36" />

    <button onclick="calculate()">Calculate</button>

    <div class="result" id="result"></div>
    <div class="small">2 weeks for first 6 months + 1 week per additional 6-month period. Max 72 weeks.</div>
  </div>

  <script>
    function calculate() {
      const weeklyPay = parseFloat(document.getElementById('weeklyPay').value);
      const months = parseInt(document.getElementById('months').value);

      if (!weeklyPay || !months) {
        document.getElementById('result').innerText = 'Please fill in all fields.';
        return;
      }

      let weeks = 0;

      if (months >= 6) {
        weeks = 2;
        const additionalPeriods = Math.floor((months - 6) / 6);
        if (additionalPeriods > 0) {
          weeks += additionalPeriods;
        }
      }

      weeks = Math.min(weeks, 72);

      const payout = weeks * weeklyPay;

      document.getElementById('result').innerText =
        `Estimated Severance: $${payout.toLocaleString()} (${weeks} weeks)`;
    }
  </script>
</body>
</html>
